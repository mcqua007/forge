name: Check Forge Models

on:
  push:
    branches:
      - main
      - sean/update-default-moels
  pull_request:

jobs:
  check-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check generated model sync
        run: npm run check-models
